<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Books</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        /* Navbar */

        .navbar{
            background:#0d6efd;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
        }

        .logo h2{
            font-size:30px;
        }

        .nav-links{
            display:flex;
            gap:25px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        .nav-links a:hover{
            text-decoration:underline;
        }

        /* Heading */

        .heading{
            text-align:center;
            margin:30px 0;
        }

        .heading h1{
            color:#0d6efd;
        }

        /* Search */

        .search-container{
            width:90%;
            margin:20px auto;
            display:flex;
            gap:20px;
        }

        .search-container input,
        .search-container select{
            flex:1;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        /* Table */

        table{
            width:90%;
            margin:30px auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        table th,
        table td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        table th{
            background:#0d6efd;
            color:white;
        }

        tr:nth-child(even){
            background:#f8f8f8;
        }

        .delete-btn{
            background:red;
            color:white;
            border:none;
            padding:8px 12px;
            border-radius:5px;
            cursor:pointer;
        }

        .delete-btn:hover{
            background:darkred;
        }

        footer{
            margin-top:40px;
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
        }

    </style>

</head>
<body>

    <!-- Navbar -->

    <div class="navbar">

        <div class="logo">
            <h2>LibraryMS</h2>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="addBooks.html">Add Books</a>
            <a href="books.html">Books</a>
            <a href="borrowBooks.html">Borrow</a>
            <a href="returnBook.html">Return</a>
            <a href="dashboard.html">Dashboard</a>
        </div>

    </div>

    <!-- Heading -->

    <div class="heading">
        <h1>Library Books</h1>
    </div>

    <!-- Search -->

    <div class="search-container">

        <input
            type="text"
            id="searchInput"
            placeholder="Search by Book Title..."
        >

        <select id="categoryFilter">

            <option value="All">All Categories</option>
            <option value="Programming">Programming</option>
            <option value="Science">Science</option>
            <option value="Mathematics">Mathematics</option>
            <option value="History">History</option>
            <option value="Biography">Biography</option>
            <option value="Novel">Novel</option>

        </select>

    </div>

    <!-- Books Table -->

    <table>

        <thead>

            <tr>

                <th>Book ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Publisher</th>
                <th>Year</th>
                <th>Total Copies</th>
                <th>Available</th>
                <th>Status</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="bookTableBody">

            <!-- Data comes from books.js -->

        </tbody>

    </table>

    <footer>

        <p>
            © 2026 Library Management System. All Rights Reserved.
        </p>

    </footer>

    <script src="javascript/books.js"></script>

</body>
</html>
