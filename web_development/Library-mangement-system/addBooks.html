<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        /* Navbar */

        .navbar{
            background:blue;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
        }

        .logo h2{
            font-size:28px;
        }

        .nav-links{
            display:flex;
            gap:25px;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        .nav-links a:hover{
            text-decoration:underline;
        }

        /* Form */

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .form-box{
            background:white;
            width:500px;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        .form-box h2{
            text-align:center;
            color:blue;
            margin-bottom:20px;
        }

        .form-group{
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:17px;
        }

        button:hover{
            background:darkblue;
        }

        footer{
            background:black;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

    </style>

</head>
<body>

    <!-- Navbar -->

    <div class="navbar">

        <div class="logo">
            <h2>LibraryMS</h2>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="addBooks.html">Add Books</a>
            <a href="books.html">Books</a>
            <a href="borrowBooks.html">Borrow</a>
            <a href="returnBook.html">Return</a>
            <a href="dashboard.html">Dashboard</a>
        </div>

    </div>

    <!-- Form -->

    <div class="container">

        <div class="form-box">

            <h2>Add New Book</h2>

            <form id="bookForm">

                <div class="form-group">
                    <label>Book ID</label>
                    <input type="text" id="bookId" required>
                </div>

                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" id="title" required>
                </div>

                <div class="form-group">
                    <label>Author Name</label>
                    <input type="text" id="author" required>
                </div>

                <div class="form-group">
                    <label>Category</label>

                    <select id="category">

                        <option>Programming</option>
                        <option>Science</option>
                        <option>Mathematics</option>
                        <option>History</option>
                        <option>Biography</option>
                        <option>Novel</option>

                    </select>

                </div>

                <div class="form-group">
                    <label>Publisher</label>
                    <input type="text" id="publisher" required>
                </div>

                <div class="form-group">
                    <label>Publication Year</label>
                    <input type="number" id="year" required>
                </div>

                <div class="form-group">
                    <label>Total Copies</label>
                    <input type="number" id="copies" min="1" required>
                </div>

                <button type="submit">
                    Add Book
                </button>

            </form>

        </div>

    </div>

    <!-- Footer -->

    <footer>
        <p>© 2026 Library Management System. All Rights Reserved.</p>
    </footer>

    <script src="javascript/addBooks.js"></script>

</body>
</html>
