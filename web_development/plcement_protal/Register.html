<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Navbar */
        .navbar {
            background-color: rgb(98, 98, 99);
            color: rgb(153, 145, 224);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
        }

        .logo h2 {
            font-size: 28px;
            box-shadow: 7px -2px 19px 5px black;
            padding: 5px 10px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 18px;
        }

        /* Registration Form */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            background-color: #f4f4f4;
        }

        .register-box {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .register-box h2 {
            text-align: center;
            color: blue;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        footer {
            background-color: black;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <h2>Placement Portal</h2>
        </div>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="jobs.html">Jobs</a>
            <a href="login.html">Login</a>
            <a href="#">Admin</a>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="container">
        <div class="register-box">

            <h2>Student Registration</h2>

            <form id="registerForm">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <div class="form-group">
                    <label for="branch">Branch</label>

                    <select id="branch" required>
                        <option value="">Select Branch</option>
                        <option value="CSE">CSE</option>
                        <option value="IT">IT</option>
                        <option value="ECE">ECE</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Civil">Civil</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="year">Passout Year</label>
                    <input
                        type="number"
                        id="year"
                        placeholder="Enter passout year"
                        required>
                </div>

                <button type="submit">
                    Register
                </button>

            </form>

        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Placement Portal. All Rights Reserved.</p>
    </footer>

    <script src="./Javascript/register.js"></script>

</body>

</html>
