<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Navbar */
        .navbar {
            background-color: rgb(98, 98, 99);
            color: rgb(153, 145, 224);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
        }

        .logo h2 {
            font-size: 28px;
            box-shadow: 7px -2px 19px 5px black;
            padding: 5px 10px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 18px;
        }

        /* Login Form */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85vh;
            background-color: #f5f5f5;
        }

        .login-box {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        .login-box h2 {
            text-align: center;
            color: blue;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }

        footer {
            background-color: black;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">
            <h2>Placement Portal</h2>
        </div>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="jobs.html">Jobs</a>
            <a href="register.html">Register</a>
        
        </div>
    </div>

    <!-- Login Form -->
    <div class="container">
        <div class="login-box">

            <h2>Student Login</h2>

            <form id="loginForm">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <button type="submit">Login</button>

            </form>

            <div class="register-link">
                <p>
                    Don't have an account?
                    <a href="register.html">Register Here</a>
                </p>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Placement Portal. All Rights Reserved.</p>
    </footer>

    <script src="./Javascript/login.js"></script>

</body>

</html>
