```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background-color:rgb(95,95,90);
        }

        /* Header */

        .main_container{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 30px;
            background-color:#f5f5f5;
        }

        .logo img{
            height:60px;
        }

        .heading h1{
            color:blue;
        }

        /* Navbar */

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 30px;
            background-color:black;
        }

        .links{
            display:flex;
            gap:25px;
        }

        .links a{
            text-decoration:none;
            color:white;
            font-size:18px;
        }

        .links a:hover{
            color:royalblue;
        }

        .nav-buttons button{
            padding:10px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin-left:10px;
        }

        .nav-buttons button a{
            text-decoration:none;
            color:black;
            font-weight:bold;
        }

        /* Form Section */

        .form-container{
            display:flex;
            justify-content:center;
            align-items:center;
            padding:50px 20px;
        }

        form{
            background-color:white;
            width:400px;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.3);
        }

        form h2{
            text-align:center;
            margin-bottom:20px;
            color:blue;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        input:focus{
            outline:none;
            border:2px solid green;
        }

        .register-btn{
            width:100%;
            padding:12px;
            background-color:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .register-btn:hover{
            background-color:darkblue;
        }

    </style>
</head>
<body>

    <!-- Header -->

    <div class="main_container">

        <div class="logo">
            <img src="logo.jpg" alt="Logo">
        </div>

        <div class="heading">
            <h1>E-Commerce Website</h1>
        </div>

    </div>

    <!-- Navbar -->

    <div class="navbar">

        <div class="links">
            <a href="Index.html">Home</a>
            <a href="About.html">About Us</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="nav-buttons">
            <button>
                <a href="form.html">Register</a>
            </button>

            <button>
                <a href="login.html">Login</a>
            </button>
            <button><a href="cart.html">Cart</a></button>
        </div>

    </div>

    <!-- Registration Form -->

    <div class="form-container">

        <form id="registerForm">

            <h2>Login</h2>


            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                placeholder="Enter Email"
            >

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
            >

            

            <button type="submit" class="register-btn">
                Login
            </button>

        </form>

    </div>

    <script src="javascript/script.js"></script>

</body>
</html>
```
